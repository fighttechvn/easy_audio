name: example
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Playback (demo)
  just_audio: ^0.10.5

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # Easy Audio package
  easy_audio:
    path: ../

  # Dependency injection (used by record session flow demo)
  get_it: ^9.2.1
  injectable: ^2.7.1+4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # DI codegen
  build_runner: ^2.4.4
  injectable_generator: ^2.4.1

flutter:
  uses-material-design: true