name: easy_audio
description: Record audio (WAV) and stream realtime speech-to-text transcripts.
version: 3.0.0
homepage: https://github.com/fighttech-vn/easy_audio
publish_to: "none"

environment:
  sdk: ">=3.10.4 <4.0.0"
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

  intl:
  path_provider: ^2.1.5
  shared_preferences: ^2.5.4
  flutter_bloc: ^9.1.1
  permission_handler: ^12.0.0+1
  path: ^1.9.0

  floating_draggable_widget: ^2.3.0

  just_audio: ^0.10.5
  audio_session: ^0.2.2
  stt_record: ^0.0.3

  injectable: ^2.7.1+4
  get_it: ^9.2.1

  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0

  wakelock_plus: ^1.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # flutter packages pub run build_runner build --delete-conflicting-outputs
  injectable_generator:
  build_runner: ^2.10.4

  json_serializable: ^6.1.4
  freezed: ^3.2.0
